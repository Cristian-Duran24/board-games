services:
  db:
    image: postgres:18-alpine3.22
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
    container_name: boardgame_container
    volumes:
      - ./postgres:/var/lib/postgresql