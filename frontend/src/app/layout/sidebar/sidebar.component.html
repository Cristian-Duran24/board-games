<!-- Sidebar: aside es el elemento semántico correcto para navegación lateral -->
<aside class="w-72 bg-surface h-screen flex flex-col border-r border-border-default">

  <!-- Cabecera del sidebar con logo de la empresa -->
  <header class="p-6 border-b border-border-default">
    <a routerLink="/" class="flex items-center gap-3 hover:opacity-90 transition-opacity">
      <img
        src="assets/images/10MINDS-LOGO.png"
        alt="Logo 10Minds"
        class="w-10 h-10 rounded-2xl object-contain"
      />
      <div>
        <span class="text-xl font-bold text-text-primary block leading-tight">10Minds</span>
        <span class="text-xs text-text-secondary block">BoardGames</span>
      </div>
    </a>
  </header>

  <!-- Navegación principal: 4 entidades del backend -->
  <nav class="flex-1 p-4" aria-label="Menú principal">
    <p class="text-xs font-semibold text-text-muted uppercase tracking-widest px-4 mb-3">Menú Principal</p>
    <ul class="space-y-1" role="list">
      @for (item of menuItems(); track item.path) {
        <li>
          <a
            [routerLink]="item.path"
            routerLinkActive="bg-primary/10 text-text-primary border-l-4 border-primary"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-text-secondary hover:bg-subtle/40 hover:text-text-primary transition-all border-l-4 border-transparent"
            [attr.aria-label]="item.label"
          >
            <lucide-icon [img]="item.icon" class="w-5 h-5 shrink-0"></lucide-icon>
            <span class="font-medium">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- Información del usuario administrador -->
  <footer class="p-4 border-t border-border-default">
    <div class="flex items-center gap-3 bg-subtle/20 rounded-xl p-3">
      <div
        class="w-9 h-9 bg-success/20 text-success rounded-full flex items-center justify-center text-sm font-bold"
        aria-hidden="true"
      >JD</div>
      <div class="text-sm">
        <p class="font-medium text-text-primary leading-tight">Jhon Doe</p>
        <p class="text-text-muted text-xs">Super Admin</p>
      </div>
    </div>
  </footer>

</aside>
