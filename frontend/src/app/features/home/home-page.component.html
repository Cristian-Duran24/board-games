<main
  class="min-h-screen bg-[radial-gradient(at_bottom_right,var(--color-surface)_0%,var(--color-canvas)_70%)] flex items-center justify-center relative overflow-hidden"
  aria-label="Página de inicio 10Minds BoardGames">
  <div
    class="absolute inset-0 bg-[url('https://picsum.photos/id/1015/1920/1080')] bg-cover opacity-10 pointer-events-none"
    aria-hidden="true"></div>
  <section class="text-center z-10 max-w-2xl px-8 relative">
    <figure class="mx-auto mb-8 w-32 h-32 flex items-center justify-center">
      <img src="assets/images/10MINDS-LOGO.png" alt="Logo 10Minds BoardGames"
        class="w-full h-full object-contain drop-shadow-2xl" />
    </figure>
    <h1 class="text-7xl font-bold text-text-primary mb-6 tracking-tighter leading-tight drop-shadow-xl">
      10Minds<br>BoardGames
    </h1>
    <p class="text-2xl text-text-secondary mb-12 max-w-md mx-auto leading-relaxed font-light">
      Gestiona préstamos de juegos de mesa (Sucre).
    </p>
    <button routerLink="/juegos"
      class="inline-flex items-center gap-3 text-lg font-semibold px-10 py-5 bg-button-filled-primary text-white rounded-2xl shadow-lg shadow-primary/30 hover:scale-105 hover:bg-primary transition-all active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-canvas"
      type="button">
      <lucide-icon [img]="playIcon" class="w-6 h-6 stroke-2"></lucide-icon>
      Comenzar ahora
    </button>
  </section>
</main>

<footer class="absolute bottom-8 text-center w-full" aria-label="Stack tecnológico">
  <p class="text-xs text-text-muted font-mono tracking-wider opacity-60">
    NESTJS • GRAPHQL • POSTGRESQL • ANGULAR 21 • TAILWIND V4
  </p>
</footer>
