<!-- ================================================================
    EditCategoryDialog — Formulario para editar una categoría existente
    ================================================================ -->

<!-- Cabecera del dialog -->
<div class="flex items-center justify-between px-6 py-4 border-b border-border-subtle">
  <h2 class="text-xl font-bold text-text-primary">Editar Categoría</h2>
  <button type="button"
    class="text-text-muted hover:text-text-primary transition-colors p-1 rounded-lg hover:bg-subtle/30"
    (click)="onCancel()" aria-label="Cerrar">
    <lucide-icon [img]="iconClose" class="w-5 h-5" />
  </button>
</div>

<!-- Cuerpo del formulario -->
<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
  <div class="px-6 py-5">

    <div>
      <label class="form-label" for="name">Nombre de la categoría *</label>
      <input id="name" formControlName="name" type="text"
        class="input-field"
        placeholder="Ej: Estrategia, Familiar, Cooperativo..."
        autocomplete="off" />
      @if (form.get('name')?.errors?.['required'] && form.get('name')?.touched) {
        <p class="text-danger text-xs mt-1">El nombre es obligatorio</p>
      }
      @if (form.get('name')?.errors?.['minlength'] && form.get('name')?.touched) {
        <p class="text-danger text-xs mt-1">Mínimo 3 caracteres</p>
      }
    </div>

  </div>

  <!-- Pie del dialog -->
  <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-border-subtle">
    <button type="button"
      class="px-5 py-2.5 rounded-xl text-sm font-medium text-text-secondary border border-border-default hover:bg-subtle/30 transition-colors cursor-pointer"
      (click)="onCancel()" [disabled]="submitting()">
      Cancelar
    </button>

    <button type="submit"
      class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white transition-colors cursor-pointer"
      [class.bg-primary]="!submitting()" [class.hover:bg-primary/90]="!submitting()"
      [class.bg-primary/50]="submitting()" [class.cursor-not-allowed]="submitting()"
      [disabled]="form.invalid || submitting()">
      @if (submitting()) {
      <mat-spinner diameter="16" />
      <span>Guardando...</span>
      } @else {
      <span>Guardar cambios</span>
      }
    </button>
  </div>

</form>
